<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-width: 300px;
      padding: 16px;
      color: #1a1a1a;
    }
    h3 { margin: 0 0 12px; font-size: 15px; }
    label { display: block; margin-bottom: 4px; font-size: 12px; color: #666; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 10px;
      padding: 7px 14px;
      font-size: 13px;
      background: #fc4c02;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #e04400; }
    #status { margin-top: 8px; font-size: 12px; color: #22c55e; min-height: 16px; }
    .legend { margin-top: 16px; font-size: 12px; }
    .legend h4 { margin: 0 0 6px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .swatch { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>
  <h3>Trail Overlay for Strava</h3>
  <label for="apiUrl">API URL</label>
  <input id="apiUrl" type="url" placeholder="https://trail-overlay.vercel.app">
  <button id="save">Save</button>
  <div id="status"></div>

  <div class="legend">
    <h4>Difficulty</h4>
    <div class="swatch"><div class="dot" style="background:#22c55e"></div> Easy</div>
    <div class="swatch"><div class="dot" style="background:#f59e0b"></div> Intermediate</div>
    <div class="swatch"><div class="dot" style="background:#ef4444"></div> Hard</div>
    <div class="swatch"><div class="dot" style="background:#94a3b8"></div> Not set</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
