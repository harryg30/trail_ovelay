# Run production DB migrations after merge to main.
# Configure secrets (see README or comment block below): gh secrets set ...
name: Production DB migrations

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
      - 'scripts/migrate.mjs'
  workflow_dispatch:

concurrency:
  group: db-migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Preflight secrets
        env:
          TRAIL_DB_PGHOST: ${{ secrets.TRAIL_DB_PGHOST }}
          TRAIL_DB_PGUSER: ${{ secrets.TRAIL_DB_PGUSER }}
          TRAIL_DB_PGPASSWORD: ${{ secrets.TRAIL_DB_PGPASSWORD }}
          TRAIL_DB_PGDATABASE: ${{ secrets.TRAIL_DB_PGDATABASE }}
          TRAIL_DB_PGPORT: ${{ secrets.TRAIL_DB_PGPORT }}
          TRAIL_DB_AWS_REGION: ${{ secrets.TRAIL_DB_AWS_REGION }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          set -euo pipefail
          missing=0
          for v in TRAIL_DB_PGHOST TRAIL_DB_PGUSER TRAIL_DB_PGDATABASE TRAIL_DB_PGPORT; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          if [ -z "${TRAIL_DB_PGPASSWORD:-}" ]; then
            if [ -z "${TRAIL_DB_AWS_REGION:-}" ] || [ -z "${AWS_ROLE_TO_ASSUME:-}" ]; then
              echo "::error::Missing auth secrets. Set TRAIL_DB_PGPASSWORD (password auth) OR set TRAIL_DB_AWS_REGION + AWS_ROLE_TO_ASSUME (IAM/GitHub OIDC auth)."
              missing=1
            fi
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure AWS credentials (GitHub OIDC)
        if: ${{ secrets.TRAIL_DB_PGPASSWORD == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.TRAIL_DB_AWS_REGION }}

      - name: Run pending migrations
        env:
          TRAIL_DB_PGHOST: ${{ secrets.TRAIL_DB_PGHOST }}
          TRAIL_DB_PGUSER: ${{ secrets.TRAIL_DB_PGUSER }}
          TRAIL_DB_PGPASSWORD: ${{ secrets.TRAIL_DB_PGPASSWORD }}
          TRAIL_DB_PGDATABASE: ${{ secrets.TRAIL_DB_PGDATABASE }}
          TRAIL_DB_PGPORT: ${{ secrets.TRAIL_DB_PGPORT }}
          TRAIL_DB_PGSSLMODE: ${{ secrets.TRAIL_DB_PGSSLMODE }}
          TRAIL_DB_SSL: ${{ secrets.TRAIL_DB_SSL }}
          TRAIL_DB_AWS_REGION: ${{ secrets.TRAIL_DB_AWS_REGION }}
        run: npm run db:migrate:prod
