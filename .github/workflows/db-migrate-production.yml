# Production Postgres migrations (Neon).
#
# This job connects the same way as `npm run db:migrate:prod`: connection-string auth only.
# Configure GitHub Actions secrets to match your Neon project (rotate these when you move to a new Neon DB).
#
# Recommended for Neon + Vercel:
#   - DATABASE_URL_MIGRATE = direct (non-pooler) URL — used by this workflow for DDL (avoids pooler limits).
#   - Optionally also set DATABASE_URL if your scripts expect both; migrate prefers MIGRATE when set.
#   - Or a single DATABASE_URL if it already points at the direct host.
#
# Alternative: discrete TRAIL_DB_* + TRAIL_DB_PGPASSWORD (no connection string secret).
name: Production DB migrations

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
      - 'scripts/migrate.mjs'
      - 'scripts/db-script-pool.mjs'
      - 'lib/pg-connection-env.mjs'
  workflow_dispatch:

concurrency:
  group: db-migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Preflight (Neon connection secrets)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_MIGRATE: ${{ secrets.DATABASE_URL_MIGRATE }}
          TRAIL_DB_PGHOST: ${{ secrets.TRAIL_DB_PGHOST }}
          TRAIL_DB_PGUSER: ${{ secrets.TRAIL_DB_PGUSER }}
          TRAIL_DB_PGPASSWORD: ${{ secrets.TRAIL_DB_PGPASSWORD }}
          TRAIL_DB_PGDATABASE: ${{ secrets.TRAIL_DB_PGDATABASE }}
          TRAIL_DB_PGPORT: ${{ secrets.TRAIL_DB_PGPORT }}
        run: |
          set -euo pipefail
          missing=0
          if [ -n "${DATABASE_URL:-}" ] || [ -n "${DATABASE_URL_MIGRATE:-}" ]; then
            echo "Neon: using DATABASE_URL and/or DATABASE_URL_MIGRATE for migrations."
            if [ -n "${DATABASE_URL:-}" ] && [ -z "${DATABASE_URL_MIGRATE:-}" ]; then
              case "${DATABASE_URL}" in
                *pooler*)
                  echo "::warning::DATABASE_URL looks like Neon's pooler host. For production DDL, set DATABASE_URL_MIGRATE to the direct connection string from the Neon dashboard (see README)."
                  ;;
              esac
            fi
            exit 0
          fi
          for v in TRAIL_DB_PGHOST TRAIL_DB_PGUSER TRAIL_DB_PGDATABASE TRAIL_DB_PGPORT; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required secret: $v (or set DATABASE_URL / DATABASE_URL_MIGRATE for Neon)"
              missing=1
            fi
          done
          if [ -z "${TRAIL_DB_PGPASSWORD:-}" ]; then
            echo "::error::Missing TRAIL_DB_PGPASSWORD (or set Neon DATABASE_URL / DATABASE_URL_MIGRATE with user+password in the URL)"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run pending migrations (Neon)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_MIGRATE: ${{ secrets.DATABASE_URL_MIGRATE }}
          TRAIL_DB_PGHOST: ${{ secrets.TRAIL_DB_PGHOST }}
          TRAIL_DB_PGUSER: ${{ secrets.TRAIL_DB_PGUSER }}
          TRAIL_DB_PGPASSWORD: ${{ secrets.TRAIL_DB_PGPASSWORD }}
          TRAIL_DB_PGDATABASE: ${{ secrets.TRAIL_DB_PGDATABASE }}
          TRAIL_DB_PGPORT: ${{ secrets.TRAIL_DB_PGPORT }}
          TRAIL_DB_PGSSLMODE: ${{ secrets.TRAIL_DB_PGSSLMODE }}
          TRAIL_DB_SSL: ${{ secrets.TRAIL_DB_SSL }}
        run: npm run db:migrate:prod
