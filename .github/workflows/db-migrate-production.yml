# Run production DB migrations after merge to main.
# Secrets: either DATABASE_URL (recommended for Neon) or discrete TRAIL_DB_* + TRAIL_DB_PGPASSWORD.
# Optional: DATABASE_URL_MIGRATE in CI overrides TRAIL_DB_* for a direct (non-pooler) connection.
name: Production DB migrations

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
      - 'scripts/migrate.mjs'
      - 'scripts/db-script-pool.mjs'
      - 'lib/pg-connection-env.mjs'
  workflow_dispatch:

concurrency:
  group: db-migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Preflight secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_MIGRATE: ${{ secrets.DATABASE_URL_MIGRATE }}
          TRAIL_DB_PGHOST: ${{ secrets.TRAIL_DB_PGHOST }}
          TRAIL_DB_PGUSER: ${{ secrets.TRAIL_DB_PGUSER }}
          TRAIL_DB_PGPASSWORD: ${{ secrets.TRAIL_DB_PGPASSWORD }}
          TRAIL_DB_PGDATABASE: ${{ secrets.TRAIL_DB_PGDATABASE }}
          TRAIL_DB_PGPORT: ${{ secrets.TRAIL_DB_PGPORT }}
        run: |
          set -euo pipefail
          missing=0
          if [ -n "${DATABASE_URL:-}" ] || [ -n "${DATABASE_URL_MIGRATE:-}" ]; then
            echo "Using DATABASE_URL or DATABASE_URL_MIGRATE for migrations."
            exit 0
          fi
          for v in TRAIL_DB_PGHOST TRAIL_DB_PGUSER TRAIL_DB_PGDATABASE TRAIL_DB_PGPORT; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required secret: $v (or set DATABASE_URL)"
              missing=1
            fi
          done
          if [ -z "${TRAIL_DB_PGPASSWORD:-}" ]; then
            echo "::error::Missing TRAIL_DB_PGPASSWORD (or set DATABASE_URL with password)"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Run pending migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_URL_MIGRATE: ${{ secrets.DATABASE_URL_MIGRATE }}
          TRAIL_DB_PGHOST: ${{ secrets.TRAIL_DB_PGHOST }}
          TRAIL_DB_PGUSER: ${{ secrets.TRAIL_DB_PGUSER }}
          TRAIL_DB_PGPASSWORD: ${{ secrets.TRAIL_DB_PGPASSWORD }}
          TRAIL_DB_PGDATABASE: ${{ secrets.TRAIL_DB_PGDATABASE }}
          TRAIL_DB_PGPORT: ${{ secrets.TRAIL_DB_PGPORT }}
          TRAIL_DB_PGSSLMODE: ${{ secrets.TRAIL_DB_PGSSLMODE }}
          TRAIL_DB_SSL: ${{ secrets.TRAIL_DB_SSL }}
        run: npm run db:migrate:prod
